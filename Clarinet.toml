[project]
name = "eip-protocol"
authors = ["EIP Protocol Team"]
description = "Decentralized financial settlement platform for group expense management"
telemetry = false
requirements = []
[contracts.eip-protocol-core]
path = "contracts/eip-protocol-core.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = true
trusted_sender = false
trusted_caller = false
callee_filter = false
